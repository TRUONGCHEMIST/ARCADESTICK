CONFIG_ZMK=y

CONFIG_ZMK_BLE=y

CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y

CONFIG_BT_DEVICE_NAME="Arcade Stick"

CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5


CONFIG_ZMK_SETTINGS=y

# ❌ TẮT cái này khi dùng ổn định (rất quan trọng)
# CONFIG_ZMK_BLE_CLEAR_BONDS_ON_START=y

# -----------------------------
# USB HID / NKRO FIX
# -----------------------------
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_HID=y

CONFIG_ZMK_USB=y

# 🔥 FIX 6-key limit → bật NKRO
CONFIG_ZMK_HID_REPORT_TYPE_NKRO=y

# ❌ tránh fallback 6KRO boot mode
CONFIG_USB_HID_BOOT_PROTOCOL=n

# -----------------------------
# INPUT STABILITY (khuyến nghị)
# -----------------------------
CONFIG_INPUT=y

# debounce (giảm double press / miss key)
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

# -----------------------------
# OPTIONAL (nếu arcade stick / game)
# -----------------------------
CONFIG_ZMK_HID_CONSUMER_REPORT=y

# latency nhỏ hơn (ổn định hơn khi bấm nhanh)
CONFIG_ZMK_KEYBOARD_REPORT_INTERVAL=1
